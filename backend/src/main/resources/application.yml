spring:
  application:
    name: backend
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: update
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com}}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:${OPENAI_CHAT_MODEL:gpt-4o-mini}}
          temperature: ${SPRING_AI_OPENAI_CHAT_OPTIONS_TEMPERATURE:${OPENAI_CHAT_TEMPERATURE:0.2}}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger.observability.svc.cluster.local:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-at-least-32-characters}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  paths-to-match:
    - /api/**

connector:
  allow-loopback: ${ALLOW_LOOPBACK_CONNECTORS:false}

optimization:
  ai:
    llm-enabled: ${OPTIMIZATION_AI_LLM_ENABLED:true}
