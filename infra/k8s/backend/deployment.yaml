apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  # 항상 유지할 백엔드 파드 개수입니다.
  replicas: 2
  selector:
    # Deployment가 관리할 파드를 찾는 라벨 조건입니다.
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: asia-northeast3-docker.pkg.dev/project-4f97da53-2e5a-4ef8-b6b/jeolgamai/backend:2026-03-20-04-17-ec245be1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://ssafy-mysql-db.mysql.database.azure.com:3306/S14P21A502?serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
            - name: SPRING_DATASOURCE_USERNAME
              value: S14P21A502
            - name: SPRING_DATASOURCE_PASSWORD
              value: rt1hEOPWKh
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.mysql.cj.jdbc.Driver
            - name: OTEL_SERVICE_NAME
              value: backend
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger.observability.svc.cluster.local:4318/v1/traces
            - name: GMS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-runtime-secrets
                  key: GMS_API_KEY
                  optional: true
            - name: CONNECTOR_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-runtime-secrets
                  key: CONNECTOR_ENCRYPTION_KEY
                  optional: true
            - name: APP_JWT_SECRET
              value: S14P21A502-jeolgamai-jwt-prod-secret-2026-change-before-export
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
