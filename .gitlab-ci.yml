stages:
  - notify_start
  - prepare
  - build
  - gitops
  - notify_end

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - when: never

variables:
  GCP_PROJECT_ID: "project-4f97da53-2e5a-4ef8-b6b"
  GAR_LOCATION: "asia-northeast3"
  GAR_REPOSITORY: "jeolgamai"
  GAR_HOST: "asia-northeast3-docker.pkg.dev"
  NOTIFY_WEBHOOK_URL: "https://meeting.ssafy.com/hooks/9surx989wprdtrrzhgncq9t9qw"
  NOTIFY_BOT_NAME: "jeolgamai-cicd"
  GMS_API_KEY: "S14P22A502-dfcab446-743b-4245-bcf2-f5d70bbd042a"

.master_only_rules: &master_only_rules
  - if: '$CI_COMMIT_BRANCH == "master"'
  - when: never

notify_pipeline_start:
  stage: notify_start
  image: curlimages/curl:8.12.1
  rules: *master_only_rules
  script:
    - |
      NOW_TS="$(date +%s)"
      PAYLOAD="$(cat <<EOF
      {
        "username": "${NOTIFY_BOT_NAME}",
        "icon_emoji": ":rocket:",
        "attachments": [
          {
            "color": "#3B82F6",
            "title": "CI/CD 시작",
            "title_link": "${CI_PIPELINE_URL}",
            "text": "파이프라인 실행을 시작했습니다.",
            "fields": [
              {"title": "프로젝트", "value": "${CI_PROJECT_PATH}", "short": true},
              {"title": "브랜치", "value": "${CI_COMMIT_REF_NAME}", "short": true},
              {"title": "커밋", "value": "${CI_COMMIT_SHORT_SHA}", "short": true},
              {"title": "파이프라인", "value": "#${CI_PIPELINE_ID}", "short": true},
              {"title": "실행자", "value": "${GITLAB_USER_NAME:-system}", "short": true},
              {"title": "트리거", "value": "${CI_PIPELINE_SOURCE}", "short": true}
            ],
            "footer": "GitLab CI",
            "ts": ${NOW_TS}
          }
        ]
      }
      EOF
      )"
      curl -sS -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$NOTIFY_WEBHOOK_URL" || true
  allow_failure: true

prepare_release:
  stage: prepare
  image: alpine:3.20
  rules: *master_only_rules
  script:
    - IMAGE_TIMESTAMP="$(date -u +%Y-%m-%d-%H-%M)"
    - IMAGE_TAG="${IMAGE_TIMESTAMP}-${CI_COMMIT_SHORT_SHA}"
    - echo "IMAGE_TIMESTAMP=${IMAGE_TIMESTAMP}" > release.env
    - echo "IMAGE_TAG=${IMAGE_TAG}" >> release.env
    - echo "Using IMAGE_TAG=${IMAGE_TAG}"
  artifacts:
    reports:
      dotenv: release.env

build_backend_image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules: *master_only_rules
  needs:
    - job: prepare_release
      artifacts: true
  script:
    - |
      for v in IMAGE_TAG; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then echo "Missing required variable: $v"; exit 1; fi
      done
    - |
      GMS_RUNTIME_KEY="${GMS_API_KEY:-${GMS_KEY:-}}"
      if [ -z "${GMS_RUNTIME_KEY}" ]; then
        echo "Missing required variable: GMS_API_KEY (or GMS_KEY)"
        exit 1
      fi
    - |
      if [ -z "${GCP_SA_KEY:-}" ]; then
        echo "Missing required variable: GCP_SA_KEY"
        exit 1
      fi
    - mkdir -p /kaniko/.docker
    - |
      GAR_AUTH="$(printf '_json_key:%s' "${GCP_SA_KEY}" | base64 | tr -d '\n')"
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "${GAR_HOST}": { "auth": "${GAR_AUTH}" },
          "https://${GAR_HOST}": { "auth": "${GAR_AUTH}" }
        }
      }
      EOF
    - BACKEND_IMAGE_REPO="${GAR_HOST}/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/backend"
    - /kaniko/executor --context "${CI_PROJECT_DIR}/backend" --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile" --build-arg "GMS_API_KEY=${GMS_RUNTIME_KEY}" --destination "${BACKEND_IMAGE_REPO}:${IMAGE_TAG}" --destination "${BACKEND_IMAGE_REPO}:latest" --cache=true --cache-ttl=168h
    - echo "BACKEND_IMAGE=${BACKEND_IMAGE_REPO}:${IMAGE_TAG}" > backend.env
  artifacts:
    reports:
      dotenv: backend.env

build_frontend_image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules: *master_only_rules
  needs:
    - job: prepare_release
      artifacts: true
  script:
    - |
      for v in IMAGE_TAG; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then echo "Missing required variable: $v"; exit 1; fi
      done
    - |
      if [ -z "${GCP_SA_KEY:-}" ]; then
        echo "Missing required variable: GCP_SA_KEY"
        exit 1
      fi
    - mkdir -p /kaniko/.docker
    - |
      GAR_AUTH="$(printf '_json_key:%s' "${GCP_SA_KEY}" | base64 | tr -d '\n')"
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "${GAR_HOST}": { "auth": "${GAR_AUTH}" },
          "https://${GAR_HOST}": { "auth": "${GAR_AUTH}" }
        }
      }
      EOF
    - FRONTEND_IMAGE_REPO="${GAR_HOST}/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/frontend"
    - /kaniko/executor --context "${CI_PROJECT_DIR}/frontend" --dockerfile "${CI_PROJECT_DIR}/frontend/Dockerfile" --destination "${FRONTEND_IMAGE_REPO}:${IMAGE_TAG}" --destination "${FRONTEND_IMAGE_REPO}:latest" --cache=true --cache-ttl=168h
    - echo "FRONTEND_IMAGE=${FRONTEND_IMAGE_REPO}:${IMAGE_TAG}" > frontend.env
  artifacts:
    reports:
      dotenv: frontend.env

update_gitops_manifests:
  stage: gitops
  image:
    name: alpine/git:2.47.2
    entrypoint: [""]
  rules: *master_only_rules
  needs:
    - job: prepare_release
      artifacts: true
    - job: build_backend_image
      artifacts: true
    - job: build_frontend_image
      artifacts: true
  script:
    - |
      for v in IMAGE_TAG BACKEND_IMAGE FRONTEND_IMAGE CI_SERVER_HOST CI_PROJECT_PATH; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then echo "Missing required variable: $v"; exit 1; fi
      done
    - |
      if [ -n "${GITOPS_PUSH_USER:-}" ] && [ -n "${GITOPS_PUSH_TOKEN:-}" ]; then
        PUSH_REMOTE_URL="https://${GITOPS_PUSH_USER}:${GITOPS_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      elif [ -n "${CI_JOB_TOKEN:-}" ]; then
        PUSH_REMOTE_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "Missing push credentials. Set GITOPS_PUSH_USER and GITOPS_PUSH_TOKEN."
        exit 1
      fi
    - git config --global user.name "gitlab-ci-bot"
    - git config --global user.email "gitlab-ci-bot@local"
    - git fetch origin master
    - git checkout -B master origin/master
    - git remote set-url --push origin "${PUSH_REMOTE_URL}"
    - sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*|\1${BACKEND_IMAGE}|" infra/k8s/backend/deployment.yaml
    - sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*|\1${FRONTEND_IMAGE}|" infra/k8s/frontend/deployment.yaml
    - |
      if git diff --quiet infra/k8s/backend/deployment.yaml infra/k8s/frontend/deployment.yaml; then
        echo "No manifest changes detected."
        exit 0
      fi
    - git add infra/k8s/backend/deployment.yaml infra/k8s/frontend/deployment.yaml
    - 'git commit -m "chore(gitops): deploy ${IMAGE_TAG} [skip ci]"'
    - git push origin HEAD:master

notify_pipeline_success:
  stage: notify_end
  image: curlimages/curl:8.12.1
  rules: *master_only_rules
  script:
    - |
      NOW_TS="$(date +%s)"
      PAYLOAD="$(cat <<EOF
      {
        "username": "${NOTIFY_BOT_NAME}",
        "icon_emoji": ":white_check_mark:",
        "attachments": [
          {
            "color": "#22C55E",
            "title": "CI/CD 완료",
            "title_link": "${CI_PIPELINE_URL}",
            "text": "파이프라인이 정상 종료되었습니다.",
            "fields": [
              {"title": "프로젝트", "value": "${CI_PROJECT_PATH}", "short": true},
              {"title": "브랜치", "value": "${CI_COMMIT_REF_NAME}", "short": true},
              {"title": "커밋", "value": "${CI_COMMIT_SHORT_SHA}", "short": true},
              {"title": "파이프라인", "value": "#${CI_PIPELINE_ID}", "short": true}
            ],
            "footer": "GitLab CI",
            "ts": ${NOW_TS}
          }
        ]
      }
      EOF
      )"
      curl -sS -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$NOTIFY_WEBHOOK_URL" || true
  when: on_success
  allow_failure: true

notify_pipeline_failure:
  stage: notify_end
  image: curlimages/curl:8.12.1
  rules: *master_only_rules
  script:
    - |
      NOW_TS="$(date +%s)"
      PAYLOAD="$(cat <<EOF
      {
        "username": "${NOTIFY_BOT_NAME}",
        "icon_emoji": ":x:",
        "attachments": [
          {
            "color": "#EF4444",
            "title": "CI/CD 실패",
            "title_link": "${CI_PIPELINE_URL}",
            "text": "파이프라인 실행 중 오류가 발생했습니다.",
            "fields": [
              {"title": "프로젝트", "value": "${CI_PROJECT_PATH}", "short": true},
              {"title": "브랜치", "value": "${CI_COMMIT_REF_NAME}", "short": true},
              {"title": "커밋", "value": "${CI_COMMIT_SHORT_SHA}", "short": true},
              {"title": "파이프라인", "value": "#${CI_PIPELINE_ID}", "short": true},
              {"title": "실행자", "value": "${GITLAB_USER_NAME:-system}", "short": true},
              {"title": "확인 링크", "value": "${CI_PIPELINE_URL}", "short": true}
            ],
            "footer": "GitLab CI",
            "ts": ${NOW_TS}
          }
        ]
      }
      EOF
      )"
      curl -sS -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$NOTIFY_WEBHOOK_URL" || true
  when: on_failure
  allow_failure: true
