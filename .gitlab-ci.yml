stages:
  - notify_start
  - prepare
  - build
  - gitops
  - notify_end

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - when: never

variables:
  GCP_PROJECT_ID: "project-4f97da53-2e5a-4ef8-b6b"
  GAR_LOCATION: "asia-northeast3"
  GAR_REPOSITORY: "jeolgamai"
  GAR_HOST: "asia-northeast3-docker.pkg.dev"
  NOTIFY_WEBHOOK_URL: "https://meeting.ssafy.com/hooks/9surx989wprdtrrzhgncq9t9qw"

notify_pipeline_start:
  stage: notify_start
  image: curlimages/curl:8.12.1
  script:
    - |
      MSG="[CI/CD 시작] ${CI_PROJECT_PATH} / ${CI_COMMIT_REF_NAME} / ${CI_COMMIT_SHORT_SHA} / pipeline #${CI_PIPELINE_ID} 시작합니다."
      PAYLOAD=$(printf '{"text":"%s"}' "$MSG")
      curl -sS -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$NOTIFY_WEBHOOK_URL" || true
  allow_failure: true

prepare_release:
  stage: prepare
  image: alpine:3.20
  script:
    - IMAGE_TIMESTAMP="$(date -u +%Y-%m-%d-%H-%M)"
    - IMAGE_TAG="${IMAGE_TIMESTAMP}-${CI_COMMIT_SHORT_SHA}"
    - echo "IMAGE_TIMESTAMP=${IMAGE_TIMESTAMP}" > release.env
    - echo "IMAGE_TAG=${IMAGE_TAG}" >> release.env
    - echo "Using IMAGE_TAG=${IMAGE_TAG}"
  artifacts:
    reports:
      dotenv: release.env

build_backend_image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  needs:
    - job: prepare_release
      artifacts: true
  script:
    - |
      for v in IMAGE_TAG; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then echo "Missing required variable: $v"; exit 1; fi
      done
    - BACKEND_IMAGE_REPO="${GAR_HOST}/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/backend"
    - /kaniko/executor --context "${CI_PROJECT_DIR}/backend" --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile" --destination "${BACKEND_IMAGE_REPO}:${IMAGE_TAG}" --destination "${BACKEND_IMAGE_REPO}:latest" --cache=true --cache-ttl=168h
    - echo "BACKEND_IMAGE=${BACKEND_IMAGE_REPO}:${IMAGE_TAG}" > backend.env
  artifacts:
    reports:
      dotenv: backend.env

build_frontend_image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  needs:
    - job: prepare_release
      artifacts: true
  script:
    - |
      for v in IMAGE_TAG; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then echo "Missing required variable: $v"; exit 1; fi
      done
    - FRONTEND_IMAGE_REPO="${GAR_HOST}/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/frontend"
    - /kaniko/executor --context "${CI_PROJECT_DIR}/frontend" --dockerfile "${CI_PROJECT_DIR}/frontend/Dockerfile" --destination "${FRONTEND_IMAGE_REPO}:${IMAGE_TAG}" --destination "${FRONTEND_IMAGE_REPO}:latest" --cache=true --cache-ttl=168h
    - echo "FRONTEND_IMAGE=${FRONTEND_IMAGE_REPO}:${IMAGE_TAG}" > frontend.env
  artifacts:
    reports:
      dotenv: frontend.env

update_gitops_manifests:
  stage: gitops
  image:
    name: alpine/git:2.47.2
    entrypoint: [""]
  needs:
    - job: prepare_release
      artifacts: true
    - job: build_backend_image
      artifacts: true
    - job: build_frontend_image
      artifacts: true
  script:
    - |
      for v in IMAGE_TAG BACKEND_IMAGE FRONTEND_IMAGE CI_SERVER_HOST CI_PROJECT_PATH; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then echo "Missing required variable: $v"; exit 1; fi
      done
    - |
      if [ -n "${GITOPS_PUSH_USER:-}" ] && [ -n "${GITOPS_PUSH_TOKEN:-}" ]; then
        PUSH_REMOTE_URL="https://${GITOPS_PUSH_USER}:${GITOPS_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      elif [ -n "${CI_JOB_TOKEN:-}" ]; then
        PUSH_REMOTE_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "Missing push credentials. Set GITOPS_PUSH_USER and GITOPS_PUSH_TOKEN."
        exit 1
      fi
    - git config --global user.name "gitlab-ci-bot"
    - git config --global user.email "gitlab-ci-bot@local"
    - git fetch origin master
    - git checkout -B master origin/master
    - git remote set-url --push origin "${PUSH_REMOTE_URL}"
    - sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*|\1${BACKEND_IMAGE}|" infra/k8s/backend/deployment.yaml
    - sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*|\1${FRONTEND_IMAGE}|" infra/k8s/frontend/deployment.yaml
    - |
      if git diff --quiet infra/k8s/backend/deployment.yaml infra/k8s/frontend/deployment.yaml; then
        echo "No manifest changes detected."
        exit 0
      fi
    - git add infra/k8s/backend/deployment.yaml infra/k8s/frontend/deployment.yaml
    - 'git commit -m "chore(gitops): deploy ${IMAGE_TAG} [skip ci]"'
    - git push origin HEAD:master

sync_backend_secret:
  stage: gitops
  image:
    name: bitnami/kubectl:1.30
    entrypoint: [""]
  needs:
    - job: update_gitops_manifests
  script:
    - |
      for v in KUBE_CONFIG_DATA SPRING_DATASOURCE_URL SPRING_DATASOURCE_USERNAME SPRING_DATASOURCE_PASSWORD OTEL_EXPORTER_OTLP_ENDPOINT; do
        eval "val=\${$v-}"
        if [ -z "$val" ]; then
          echo "Missing required variable: $v"
          exit 1
        fi
      done
    - echo "$KUBE_CONFIG_DATA" | base64 -d > kubeconfig
    - export KUBECONFIG="${PWD}/kubeconfig"
    - |
      kubectl -n app create secret generic backend-env \
        --from-literal=SPRING_DATASOURCE_URL="${SPRING_DATASOURCE_URL}" \
        --from-literal=SPRING_DATASOURCE_USERNAME="${SPRING_DATASOURCE_USERNAME}" \
        --from-literal=SPRING_DATASOURCE_PASSWORD="${SPRING_DATASOURCE_PASSWORD}" \
        --from-literal=SPRING_DATASOURCE_DRIVER_CLASS_NAME="com.mysql.cj.jdbc.Driver" \
        --from-literal=OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT}" \
        --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n app rollout restart deploy/backend
    - kubectl -n app rollout status deploy/backend --timeout=180s

notify_pipeline_success:
  stage: notify_end
  image: curlimages/curl:8.12.1
  script:
    - |
      MSG="[CI/CD 완료] ${CI_PROJECT_PATH} / ${CI_COMMIT_REF_NAME} / ${CI_COMMIT_SHORT_SHA} / pipeline #${CI_PIPELINE_ID} 정상 종료되었습니다."
      PAYLOAD=$(printf '{"text":"%s"}' "$MSG")
      curl -sS -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$NOTIFY_WEBHOOK_URL" || true
  when: on_success
  allow_failure: true

notify_pipeline_failure:
  stage: notify_end
  image: curlimages/curl:8.12.1
  script:
    - |
      MSG="[CI/CD 실패] ${CI_PROJECT_PATH} / ${CI_COMMIT_REF_NAME} / ${CI_COMMIT_SHORT_SHA} / pipeline #${CI_PIPELINE_ID} 오류가 발생했습니다. ${CI_PIPELINE_URL}"
      PAYLOAD=$(printf '{"text":"%s"}' "$MSG")
      curl -sS -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$NOTIFY_WEBHOOK_URL" || true
  when: on_failure
  allow_failure: true
